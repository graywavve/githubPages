<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<!-- 인티 -->
	<link rel="dns-prefetch" href="https://api-ticketfront.interpark.com">
	<link rel="preconnect" href="https://api-ticketfront.interpark.com" crossorigin>

	<!-- 멜티 -->
	<link rel="dns-prefetch" href="https://tktapi.melon.com">
	<link rel="preconnect" href="https://tktapi.melon.com" crossorigin>

	<!-- 예사 -->
	<link rel="dns-prefetch" href="https://tkwait.yes24.com">
	<link rel="preconnect" href="https://tkwait.yes24.com" crossorigin>

	<!-- 링크 -->
	<link rel="dns-prefetch" href="https://wait.ticketlink.co.kr">
	<link rel="preconnect" href="https://wait.ticketlink.co.kr" crossorigin>

	<title>🚀 예매 팝업</title>
	<style>
		body {
			font-family: '맑은 고딕', sans-serif;
			padding: 20px;
			background-color: #fdfdfd;
			color: #333;
			line-height: 1.6;
		}

		h2 {
			color: #2c3e50;
			font-size: 22px;
			margin: 5px 0 0 20px;
		}
	</style>
	<script>
		document.addEventListener("DOMContentLoaded", function () {
			try {
				const params = new URLSearchParams(window.location.search);
				const title = params.get("triggerTitle");

				if (!title) return;

				const decodedTitle = decodeURIComponent(title);
				document.title = decodedTitle;

				let waitMsg = "";
				switch (true) {
					case decodedTitle.includes("인티"):
						waitMsg = "🚀 인티 예매 대기중...";
						break;
					case decodedTitle.includes("멜티"):
						waitMsg = "🚀 멜티 예매 대기중...";
						break;
					case decodedTitle.includes("예사"):
						waitMsg = "🚀 예사 예매 대기중...";
						break;
					case decodedTitle.includes("링크"):
						waitMsg = "🚀 링크 예매 대기중...";
						document.getElementById("linkCaptcha").style.display = "";
						break;
				}

				const msgEl = document.getElementById("waitMsg");
				if (msgEl) {
					msgEl.textContent = waitMsg;
				}
			} catch (err) {
				console.error("waitMsg 처리 오류", err);
			}
		});
	</script>
</head>

<body>
	<h3 id="waitMsg"></h3>    
	<h4>🌏 키보드 입력 언어가 영문(EN)인지 확인하세요. <input type="text" placeholder="영문인지 확인하세요." style="width:240px; height:25px; margin-left:10px; vertical-align:middle; "/></h4>    
    <h4 id="linkCaptcha" style="display:none;">⚡ 티켓링크는 <b style="color:red;">1</b>번키를 누르면 캡차가 자동 입력됩니다.</h4>
	<h4>🖲️ <b style="color:red;">`</b>키로 단축키 활성화하고, <b style="color:red;">E</b>키로 확대/축소되는지 확인하세요.</h4>
    <h4>📌 좌석 위에 마우스 커서를 올리고 <b style="color:red;">Q</b>키를 누르면 좌석이 선택됩니다. (빠른 좌석 선택)</h4>
    <h4>🎯 좌석 선택이 완료되면, <b style="color:red;">W</b>키를 눌러 좌석 선택 완료하세요.</h4>
</body>

</html>
